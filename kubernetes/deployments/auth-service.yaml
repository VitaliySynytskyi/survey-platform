apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: survey-platform
    service: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: survey-platform
      service: auth-service
  template:
    metadata:
      labels:
        app: survey-platform
        service: auth-service
    spec:
      containers:
      - name: auth-service
        image: ${REGISTRY}/survey-platform/auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SERVICE_NAME
          valueFrom:
            configMapKeyRef:
              name: survey-platform-config
              key: AUTH_SERVICE_NAME
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: survey-platform-config
              key: ENVIRONMENT
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: survey-platform-config
              key: POSTGRES_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: survey-platform-config
              key: POSTGRES_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: survey-platform-config
              key: POSTGRES_DB
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: survey-platform-secrets
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: survey-platform-secrets
              key: POSTGRES_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: survey-platform-secrets
              key: JWT_SECRET
        - name: CONSUL_ADDR
          valueFrom:
            configMapKeyRef:
              name: survey-platform-config
              key: CONSUL_ADDR
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
      restartPolicy: Always