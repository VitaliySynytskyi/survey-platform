apiVersion: v1
kind: Secret
metadata:
  name: survey-platform-secrets
  labels:
    app: survey-platform
type: Opaque
stringData:
  # Database Credentials
  POSTGRES_USER: "survey_user"
  POSTGRES_PASSWORD: "change_this_in_production"
  
  # MongoDB Credentials
  MONGO_USER: "mongo_admin"
  MONGO_PASSWORD: "change_this_in_production"
  
  # RabbitMQ Credentials
  RABBITMQ_USER: "rabbit_user"
  RABBITMQ_PASSWORD: "change_this_in_production"
  
  # JWT Secret
  JWT_SECRET: "change_this_secure_key_in_production" 