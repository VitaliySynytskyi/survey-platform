version: '3.8'

services:
  # PostgreSQL service
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: survey_user
      POSTGRES_PASSWORD: survey_password
      POSTGRES_DB: survey_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey_user -d survey_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB service
  mongodb:
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ service
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: rabbit_user
      RABBITMQ_DEFAULT_PASS: rabbit_password
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Authentication Service
  auth_service:
    build:
      context: ./backend/services/auth_service
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: survey_user
      DB_PASSWORD: survey_password
      DB_NAME: survey_platform
      JWT_SECRET: your_jwt_secret_key
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # User Service
  user_service:
    build:
      context: ./backend/services/user_service
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: survey_user
      DB_PASSWORD: survey_password
      DB_NAME: survey_platform
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Survey Service
  survey_service:
    build:
      context: ./backend/services/survey_service
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: survey_user
      POSTGRES_PASSWORD: survey_password
      POSTGRES_DB: survey_platform
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: mongo_admin
      MONGO_PASSWORD: mongo_password
      MONGO_DB: survey_db
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # Survey Taking Service
  survey_taking_service:
    build:
      context: ./backend/services/survey_taking_service
      dockerfile: Dockerfile
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: mongo_admin
      MONGO_PASSWORD: mongo_password
      MONGO_DB: survey_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: rabbit_user
      RABBITMQ_PASSWORD: rabbit_password
      RABBITMQ_EXCHANGE: survey_responses
      RABBITMQ_QUEUE: response_queue
      RABBITMQ_ROUTING_KEY: response.new
    ports:
      - "8083:8083"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # Response Processor Service
  response_processor_service:
    build:
      context: ./backend/services/response_processor_service
      dockerfile: Dockerfile
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: mongo_admin
      MONGO_PASSWORD: mongo_password
      MONGO_DB: survey_results
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: rabbit_user
      RABBITMQ_PASSWORD: rabbit_password
      RABBITMQ_EXCHANGE: survey_responses
      RABBITMQ_QUEUE: response_queue
      RABBITMQ_ROUTING_KEY: response.new
      RABBITMQ_PREFETCH_COUNT: 10
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # Analytics Service
  analytics_service:
    build:
      context: ./backend/services/analytics_service
      dockerfile: Dockerfile
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: mongo_admin
      MONGO_PASSWORD: mongo_password
      MONGO_DB: survey_results
    ports:
      - "8084:8084"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # API Gateway
  api_gateway:
    build:
      context: ./backend/api_gateway
      dockerfile: Dockerfile
    environment:
      AUTH_SERVICE_URL: http://auth_service:8080
      USER_SERVICE_URL: http://user_service:8081
      SURVEY_SERVICE_URL: http://survey_service:8082
      SURVEY_TAKING_SERVICE_URL: http://survey_taking_service:8083
      ANALYTICS_SERVICE_URL: http://analytics_service:8084
    ports:
      - "8000:8000"
    depends_on:
      - auth_service
      - user_service
      - survey_service
      - survey_taking_service
      - analytics_service
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api_gateway
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  rabbitmq_data: 